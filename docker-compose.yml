version: "3.9"

services:
  app:
    image: python:3.9-slim
    container_name: fastapi_app
    working_dir: /app
    volumes:
      - ./app:/app
      - ./media:/app/media
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_FILE_PATH=/app/data/plan_combined.json
      - POSTGRES_DB=utmn_map
      - POSTGRES_USER=utmn_user
      - POSTGRES_PASSWORD=utmn_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      - media_service
      - postgres

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_DB=utmn_map
      - POSTGRES_USER=utmn_user
      - POSTGRES_PASSWORD=utmn_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
